name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Flutter 코드 검사 (Analyze) ──────────────────────────────
  flutter-check:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
        working-directory: app
      - name: Analyze
        run: flutter analyze
        working-directory: app

  # ── 2. Supabase DB 마이그레이션 ───────────────────────
  db-migrate:
    name: Supabase Migration
    runs-on: ubuntu-latest
    needs: flutter-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Apply migrations using Python
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          python3 << 'EOF'
          import os
          import psycopg2
          from pathlib import Path

          # Get database URL from secrets
          db_url = os.environ.get('DATABASE_URL')
          if not db_url:
              print("⚠️  DATABASE_URL not set, skipping migrations")
              print("Add SUPABASE_DATABASE_URL to GitHub Secrets to enable migrations")
              exit(0)

          print(f"Connecting to database...")
          conn = psycopg2.connect(db_url, sslmode='require')
          cursor = conn.cursor()

          # Apply all migrations in order
          migrations_dir = Path('supabase/migrations')
          for sql_file in sorted(migrations_dir.glob('*.sql')):
              with open(sql_file, 'r') as f:
                  sql = f.read()

              print(f"▶ Applying: {sql_file.name}")
              try:
                  cursor.execute(sql)
                  conn.commit()
                  print(f"✅ OK: {sql_file.name}")
              except Exception as e:
                  print(f"❌ Failed: {sql_file.name}")
                  print(f"Error: {e}")
                  conn.rollback()
                  raise

          cursor.close()
          conn.close()
          print("✅ All migrations applied")
          EOF

      # ── 3. 동작 검증 ──────────────────────────────────
      - name: Verify generate_daily_mission RPC
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          PROJECT_URL="https://jslotdbzorvyzwvdilvj.supabase.co"
          TEST_USER="00000000-0000-0000-0000-000000000001"

          RESULT=$(curl -sf -X POST \
            "${PROJECT_URL}/rest/v1/rpc/generate_daily_mission" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"p_user_id\": \"${TEST_USER}\"}")

          echo "RPC result: $RESULT"

          COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)")

          if [ "$COUNT" -lt 1 ]; then
            echo "❌ RPC returned empty — migration may have failed"
            exit 1
          fi

          echo "✅ RPC OK: ${COUNT}개 문장 반환"
